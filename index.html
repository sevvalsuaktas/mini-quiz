<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mini Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container mt-5">
    <div class="card shadow-lg border-0">
        <div class="card-body text-center">
            <h3 class="mb-4 text-primary">🎓 Mini Quiz</h3>

            <!-- İLERLEME ÇUBUĞU -->
            <div class="progress mb-4" style="height: 25px;">
                <div id="progress-bar" class="progress-bar bg-success" role="progressbar" style="width: 0%">
                    0%
                </div>
            </div>

            <div id="quiz-container" class="fade-in">
                <p id="question" class="fw-bold fs-5 text-dark"></p>
                <div id="options" class="mb-3"></div>
            </div>

            <div id="result" class="text-center mt-4" style="display: none;"></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="script.js"></script>
</body>
</html>
